<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <!-- Для ручного оновлення кешу просто змінюй версію тут (наприклад, на v=1.0.4), коли оновлюєш код -->
    <meta name="app-version" content="v=1.0.3">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Flow Timer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', -apple-system, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Динамічний «рідкий» фон, що заливає екран знизу вгору */
        .bg-liquid-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%; /* Керується через JS (від 100% до 0%) */
            background: linear-gradient(0deg, #ff3300 0%, #ff6600 100%);
            transition: height 1s linear, background-color 0.5s ease;
            z-index: 1;
        }

        /* Колір фону для відпочинку */
        .bg-liquid-fill.rest-phase {
            background: linear-gradient(0deg, #00aa50 0%, #00ff66 100%);
        }

        /* Головна картка інтерфейсу */
        .timer-interface {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); /* Легке затемнення поверх ефекту заливки */
            backdrop-filter: blur(8px);
        }

        /* Кнопка-шестерня у верхньому кутку */
        .gear-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
        }

        .gear-btn:hover {
            transform: rotate(90deg);
            color: #ffffff;
        }

        /* Назва фази (Раунд / Відпочинок) */
        .phase-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 60px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
            animation: pulseText 2s infinite ease-in-out;
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* ВЕЛИЧЕЗНІ ЦИФРИ (Максимальний фокус) */
        .huge-timer-digits {
            font-size: 9.5rem;
            font-weight: 900;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            margin: 10px 0;
            transition: transform 0.1s;
        }

        /* Анімація екстреного блимання, коли час вийшов */
        .time-up-blink {
            animation: urgentFlash 0.6s infinite alternate;
            color: #fff !important;
        }

        @keyframes urgentFlash {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.2; transform: scale(1.05); }
        }

        /* Інформація про поточний раунд */
        .round-info {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Кнопка у вигляді великого горизонтального розтягнення */
        .stretched-action-btn {
            width: 100%;
            padding: 24px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 100px; /* Повністю витягнута овальна форма */
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease, background-color 0.2s;
        }

        .stretched-action-btn:active {
            transform: scale(0.96);
            background-color: #e6e6e6;
        }

        /* Модалка налаштувань */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .settings-overlay.hidden {
            display: none;
        }

        .modal-box {
            background: #161616;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 35px 25px;
            position: relative;
            border: 2px solid #262626;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .close-modal-x {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            font-size: 2.5rem;
            color: #666;
            cursor: pointer;
        }

        .close-modal-x:hover {
            color: #fff;
        }

        .modal-box h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Перемикач мови */
        .language-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .lang-option {
            flex: 1;
            padding: 14px;
            background: #222;
            border: 2px solid #333;
            color: #888;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-option.active-lang {
            background: #ff4500;
            color: #fff;
            border-color: #ff4500;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
        }

        /* Інструкція всередині */
        .info-block h3 {
            font-size: 1.2rem;
            color: #ff5500;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .info-block p {
            font-size: 0.95rem;
            color: #b0b0b0;
            line-height: 1.5;
            font-family: system-ui, sans-serif;
        }

        /* Авторство та лінк на GitHub без прізвища */
        .credits-footer {
            margin-top: 35px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            font-family: system-ui, sans-serif;
        }

        .credits-footer a {
            color: #ff5500;
            text-decoration: none;
            font-weight: bold;
        }

        .credits-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Рідкий задній фон, який змінює висоту -->
    <div id="liquid-bg" class="bg-liquid-fill"></div>

    <!-- Основний інтерфейс користувача -->
    <div class="timer-interface">
        <button id="gear-btn" class="gear-btn">⚙️</button>

        <div id="phase-text" class="phase-title">Раунд</div>
        
        <!-- Лише великі цифри, жодних дрібних повторів -->
        <div id="big-timer" class="huge-timer-digits">03:00</div>

        <div id="round-text" class="round-info">Раунд 1/12</div>

        <!-- Кнопка у вигляді великого розтягнення -->
        <button id="action-btn" class="stretched-action-btn">НАСТУПНИЙ ЕТАП</button>
    </div>

    <!-- Модалка налаштувань мови та інструкції -->
    <div id="settings-popup" class="settings-overlay hidden">
        <div class="modal-box">
            <button id="close-popup" class="close-modal-x">×</button>
            <h2 id="menu-title">Налаштування</h2>

            <div class="language-wrapper">
                <button id="ua-btn" class="lang-option active-lang">УКР</button>
                <button id="en-btn" class="lang-option">ENG</button>
            </div>

            <div class="info-block">
                <h3 id="rules-title">Інструкція</h3>
                <p id="rules-paragraph">Час рухається вперед. Коли поточний етап закінчується, екран починає блимати червоним або зеленим коліром. Перехід не автоматичний — натисніть велику розтягнуту кнопку внизу, щоб змінити етап тренування вручну.</p>
            </div>

            <!-- Посилання на GitHub та чисте ім'я -->
            <div class="credits-footer">
                <span id="author-label">Developer:</span> <a href="https://github.com/projecttestm1-afk/boxing-timer" target="_blank">Maksim (GitHub)</a>
            </div>
        </div>
    </div>

    <script>
        // Тексти інтерфейсу
        const languagePack = {
            ua: {
                work: "РАУНД",
                rest: "ВІДПОЧИНОК",
                roundStr: "Раунд",
                btnText: "НАСТУПНИЙ ЕТАП",
                menuTitle: "Налаштування",
                rulesTitle: "Інструкція",
                rulesText: "Час рухається вперед. Коли поточний етап закінчується, екран починає блимати червоним або зеленим коліром. Перехід не автоматичний — натисніть велику розтягнуту кнопку внизу, щоб змінити етап тренування вручну.",
                author: "Автор:"
            },
            en: {
                work: "ROUND",
                rest: "REST",
                roundStr: "Round",
                btnText: "NEXT STEP",
                menuTitle: "Settings",
                rulesTitle: "Instructions",
                rulesText: "Time is ticking down. When the current phase ends, the screen will flash intensely. The transition is manual — tap the large stretched button below to advance to the next step.",
                author: "Developer:"
            }
        };

        // Фіксовані налаштування часу для боксу
        const TIME_WORK = 180; 
        const TIME_REST = 60;  
        const TOTAL_ROUNDS = 12;

        let currentRound = 1;
        let isWorkMode = true;
        let secondsLeft = TIME_WORK;
        let intervalTimer = null;
        let activeLang = 'ua';

        // DOM Елементи
        const liquidBg = document.getElementById('liquid-bg');
        const phaseText = document.getElementById('phase-text');
        const bigTimer = document.getElementById('big-timer');
        const roundText = document.getElementById('round-text');
        const actionBtn = document.getElementById('action-btn');
        
        const gearBtn = document.getElementById('gear-btn');
        const settingsPopup = document.getElementById('settings-popup');
        const closePopup = document.getElementById('close-popup');
        const uaBtn = document.getElementById('ua-btn');
        const enBtn = document.getElementById('en-btn');

        const menuTitle = document.getElementById('menu-title');
        const rulesTitle = document.getElementById('rules-title');
        const rulesParagraph = document.getElementById('rules-paragraph');
        const authorLabel = document.getElementById('author-label');

        // Електронний звуковий сигнал закінчення часу
        function triggerBell() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const nodeGain = audioCtx.createGain();
                osc.connect(nodeGain);
                nodeGain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(650, audioCtx.currentTime);
                nodeGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                nodeGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) { console.log("Чекаємо взаємодії з екраном для звуку."); }
        }

        // Обчислення та відображення
        function renderTimer() {
            const minutes = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            const seconds = (secondsLeft % 60).toString().padStart(2, '0');
            bigTimer.textContent = `${minutes}:${seconds}`;

            const activeMaxTime = isWorkMode ? TIME_WORK : TIME_REST;
            
            // Ефект плавної заливки рідкого фону (відсоток залишку часу)
            const percentage = (secondsLeft / activeMaxTime) * 100;
            liquidBg.style.height = `${percentage}%`;

            if (isWorkMode) {
                phaseText.textContent = languagePack[activeLang].work;
                liquidBg.classList.remove('rest-phase');
            } else {
                phaseText.textContent = languagePack[activeLang].rest;
                liquidBg.classList.add('rest-phase');
            }

            roundText.textContent = `${languagePack[activeLang].roundStr} ${currentRound}/${TOTAL_ROUNDS}`;

            // Якщо час вийшов — вмикаємо жорстке блимання екрана
            if (secondsLeft === 0) {
                bigTimer.classList.add('time-up-blink');
            } else {
                bigTimer.classList.remove('time-up-blink');
            }
        }

        function runTicker() {
            if (secondsLeft > 0) {
                secondsLeft--;
                if (secondsLeft === 0) {
                    triggerBell();
                }
                renderTimer();
            }
        }

        // Керування кнопкою-розтягненням (ручне перегортання)
        actionBtn.addEventListener('click', () => {
            if (isWorkMode) {
                isWorkMode = false;
                secondsLeft = TIME_REST;
            } else {
                isWorkMode = true;
                currentRound++;
                if (currentRound > TOTAL_ROUNDS) {
                    currentRound = 1; // Цикл зациклюється знову
                }
                secondsLeft = TIME_WORK;
            }
            renderTimer();
        });

        // Модальне вікно
        gearBtn.addEventListener('click', () => settingsPopup.classList.remove('hidden'));
        closePopup.addEventListener('click', () => settingsPopup.classList.add('hidden'));
        
        // Локалізація мови
        function updateLanguage(targetLang) {
            activeLang = targetLang;
            localStorage.setItem('boxLangChoice', targetLang);

            if (targetLang === 'ua') {
                uaBtn.classList.add('active-lang');
                enBtn.classList.remove('active-lang');
            } else {
                enBtn.classList.add('active-lang');
                uaBtn.classList.remove('active-lang');
            }

            menuTitle.textContent = languagePack[targetLang].menuTitle;
            rulesTitle.textContent = languagePack[targetLang].rulesTitle;
            rulesParagraph.textContent = languagePack[targetLang].rulesText;
            authorLabel.textContent = languagePack[targetLang].author;
            actionBtn.textContent = languagePack[targetLang].btnText;

            renderTimer();
        }

        uaBtn.addEventListener('click', () => updateLanguage('ua'));
        enBtn.addEventListener('click', () => updateLanguage('en'));

        // Автозапуск таймера відразу після відкриття сторінки
        function init() {
            const savedLang = localStorage.getItem('boxLangChoice') || 'ua';
            updateLanguage(savedLang);
            renderTimer();
            intervalTimer = setInterval(runTicker, 1000);
        }

        init();
    </script>
</body>
</html>
